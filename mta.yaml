_schema-version: 3.3.0
ID: exploratory-travel-dashboard
version: 1.0.0
description: "PrimePath Travel – Exploratory Travel Dashboard (SAP BTP + CAP + Fiori Elements)"
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install --legacy-peer-deps
        - npx cds build --production
modules:
  - name: exploratory-travel-dashboard-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: exploratory-travel-dashboard-auth
      - name: exploratory-travel-dashboard-db
      - name: exploratory-travel-dashboard-destination

  - name: exploratory-travel-dashboard-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: exploratory-travel-dashboard-db

resources:
  - name: exploratory-travel-dashboard-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: exploratory-travel-dashboard-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
  - name: exploratory-travel-dashboard-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: exploratory-travel-dashboard-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
