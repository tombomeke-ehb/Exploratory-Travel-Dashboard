_schema-version: 3.3.0
ID: exploratory-travel-dashboard
version: 1.0.0
description: "PrimePath Travel – Exploratory Travel Dashboard (SAP BTP + CAP + Fiori Elements)"
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install --legacy-peer-deps
        - npx cds build --production
        - cp app/index.html gen/srv/index.html
        - cp app/travel-login.html gen/srv/travel-login.html
        - cp app/team-login.html gen/srv/team-login.html
        - cp app/hr-login.html gen/srv/hr-login.html
        - cp app/travel-start.html gen/srv/travel-start.html
        - cp app/team-start.html gen/srv/team-start.html
        - cp app/hr-start.html gen/srv/hr-start.html
        - mkdir -p gen/srv/app
        - cp -r app/travel-dashboard/webapp gen/srv/app/travel-dashboard
        - cp -r app/team-dashboard/webapp gen/srv/app/team-dashboard
        - cp -r app/hr-dashboard/webapp gen/srv/app/hr-dashboard
modules:
  - name: exploratory-travel-dashboard-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: exploratory-travel-dashboard-db
      - name: exploratory-travel-dashboard-destination
    # Na deployment: cf set-env exploratory-travel-dashboard-srv JWT_SECRET <geheim> && cf restage
    properties:
      NODE_ENV: production

  - name: exploratory-travel-dashboard-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: exploratory-travel-dashboard-db

resources:
  - name: exploratory-travel-dashboard-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: exploratory-travel-dashboard-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
