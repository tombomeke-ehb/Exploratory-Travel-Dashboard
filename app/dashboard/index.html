<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PrimePath Travel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <style>
    :root{
      --pp-primary:#0070F2;
      --pp-primary-hover:#0058C4;
      --pp-header:#354A5E;
      --pp-sidebar:#F7F7F7;
      --pp-text:#32363A;
      --pp-text-2:#6A6D70;
      --pp-border:#E5E5E5;
      --pp-success:#107E3E;
      --pp-warning:#E9730C;
      --pp-error:#BB0000;
      --pp-row-alt:#FAFAFA;
      --pp-row-hover:#F0F7FF;
      --pp-nav-hover:#EBF2FF;
    }
    html,body{ background:#F4F5F7; color:var(--pp-text); font-family: "72", "Segoe UI", Roboto, system-ui, -apple-system, sans-serif; }
    *{ -webkit-font-smoothing:antialiased; }
    .pp-card{ background:#fff; border:1px solid var(--pp-border); box-shadow:0 1px 4px rgba(0,0,0,0.08); border-radius:6px; }
    .pp-shadow{ box-shadow:0 1px 4px rgba(0,0,0,0.1); }
    .pp-btn-primary{ background:var(--pp-primary); color:#fff; }
    .pp-btn-primary:hover{ background:var(--pp-primary-hover); }
    .pp-btn-ghost{ color:var(--pp-primary); }
    .pp-btn-ghost:hover{ background:var(--pp-nav-hover); }
    .pp-th{ background:var(--pp-sidebar); color:var(--pp-text-2); text-transform:uppercase; font-size:11px; font-weight:600; letter-spacing:0.04em; }
    .pp-tr-hover:hover{ background:var(--pp-row-hover); }
    .pp-input{ background:#fff; border:1px solid var(--pp-border); border-radius:4px; padding:6px 10px; font-size:13px; color:var(--pp-text); outline:none; transition:border-color .12s, box-shadow .12s; }
    .pp-input:focus{ border-color:var(--pp-primary); box-shadow:0 0 0 1px var(--pp-primary); }
    .pp-input.error{ border-color:var(--pp-error); box-shadow:0 0 0 1px var(--pp-error); }
    .pp-label{ font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--pp-text-2); font-weight:600; }
    .pp-badge{ display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; padding:2px 8px; border-radius:999px; line-height:1.6; }
    .pp-badge.warning{ background:#FFF3E0; color:var(--pp-warning); }
    .pp-badge.success{ background:#F1F8E9; color:var(--pp-success); }
    .pp-badge.error{ background:#FFEBEE; color:var(--pp-error); }
    .pp-badge.neutral{ background:#EEF1F4; color:var(--pp-text-2); }
    .pp-badge.info{ background:#E8F2FF; color:var(--pp-primary); }
    .pp-divider{ height:1px; background:var(--pp-border); }
    .pp-fade-enter{ animation: ppfade .18s ease both; }
    @keyframes ppfade { from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:none} }
    .pp-drawer-enter{ animation: ppdrawer .22s ease both; }
    @keyframes ppdrawer { from{transform:translateX(100%)} to{transform:none} }
    .pp-toast-enter{ animation: pptoast .25s ease both; }
    @keyframes pptoast { from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }
    .pp-spinner{ width:36px; height:36px; border:3px solid #E5E5E5; border-top-color:var(--pp-primary); border-radius:50%; animation:ppspin 0.8s linear infinite; }
    @keyframes ppspin { to { transform:rotate(360deg) } }
    .pp-scroll::-webkit-scrollbar{ width:8px; height:8px; }
    .pp-scroll::-webkit-scrollbar-thumb{ background:#cfd3d7; border-radius:4px; }
    .pp-scroll::-webkit-scrollbar-track{ background:transparent; }
    .pp-nav-item{ position:relative; }
    .pp-nav-item.active{ background:var(--pp-primary); color:#fff !important; }
    .pp-nav-item.active .pp-nav-icon{ color:#fff; }
    .pp-nav-item:not(.active):hover{ background:var(--pp-nav-hover); }
    .pp-nav-item.active::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:#fff; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="personas.jsx"></script>
  <script type="text/babel" src="pages.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
