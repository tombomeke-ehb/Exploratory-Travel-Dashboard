<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Dashboard – PrimePath Travel</title>
  <script>
    // TA §6.2: bij een 401/403 tijdens gebruik (verlopen sessie) -> terug naar login.
    // UI5 gebruikt XMLHttpRequest, niet fetch; daarom patchen we XHR (additief).
    (function () {
      var LOGIN = '/team-login.html';
      var open = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function () {
        this.addEventListener('load', function () {
          if (this.status === 401 || this.status === 403) window.location.replace(LOGIN);
        });
        return open.apply(this, arguments);
      };
    })();
  </script>
  <script id="sap-ui-bootstrap"
    src="https://sapui5.hana.ondemand.com/1.136.0/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-resourceroots='{"primepath.team": "./"}'
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true"
    data-sap-ui-frameOptions="trusted"
    data-sap-ui-oninit="module:sap/ui/core/ComponentSupport">
  </script>
  <style>
    html, body, #content { height: 100%; margin: 0; }
    /* ComponentSupport wikkelt de app in een tussen-div; geef de hele keten hoogte */
    #content > div, #container { height: 100%; }

    /* PrimePath-balk: vaste overlay (geen layout-impact op de UI5-app) */
    .pp-shell {
      position: fixed; top: 8px; right: 12px; z-index: 2000;
      display: flex; align-items: center; gap: 8px;
      font-family: '72', 'Segoe UI', Arial, sans-serif;
    }
    .pp-shell a, .pp-shell button {
      font-size: 12px; font-weight: 600; line-height: 1;
      padding: 7px 12px; border-radius: 6px; cursor: pointer;
      text-decoration: none; border: 1px solid transparent;
    }
    .pp-shell .pp-home { background: #0a6ed1; color: #fff; }
    .pp-shell .pp-home:hover { background: #085caf; }
    .pp-shell .pp-logout { background: #fff; color: #0a6ed1; border-color: #0a6ed1; }
    .pp-shell .pp-logout:hover { background: #eaf2fb; }
  </style>
</head>
<body class="sapUiBody" id="content">
  <div class="pp-shell">
    <a class="pp-home" href="/team-start.html" title="Terug naar het overzicht">← Overzicht</a>
    <button class="pp-logout" type="button" onclick="ppLogout()">Afmelden</button>
  </div>
  <script>
    function ppLogout(){ fetch('/auth/logout',{method:'POST',credentials:'include'}).finally(function(){ location.href='/'; }); }
  </script>
  <div data-sap-ui-component
    data-name="primepath.team"
    data-id="container"
    data-height="100%"
    data-settings='{"id":"primepath.team"}'
    data-handle-validation="true">
  </div>
</body>
</html>
