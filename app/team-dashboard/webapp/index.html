<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Dashboard – PrimePath Travel</title>
  <script>
    // TA §6.2: bij een 401/403 tijdens gebruik (verlopen sessie) -> terug naar login.
    // UI5 gebruikt XMLHttpRequest, niet fetch; daarom patchen we XHR (additief).
    (function () {
      var LOGIN = '/team-login.html';
      var open = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function () {
        this.addEventListener('load', function () {
          if (this.status === 401 || this.status === 403) window.location.replace(LOGIN);
        });
        return open.apply(this, arguments);
      };
    })();
  </script>
  <script id="sap-ui-bootstrap"
    src="https://sapui5.hana.ondemand.com/1.136.0/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-resourceroots='{"primepath.team": "./"}'
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true"
    data-sap-ui-frameOptions="trusted"
    data-sap-ui-oninit="module:sap/ui/core/ComponentSupport">
  </script>
  <style>
    /* Body als kolom: een echte headerbalk (in-flow) + de UI5-app eronder.
       Geen zwevende overlay meer, dus geen overlap met de Fiori-toolbar. */
    html, body, #content { height: 100%; margin: 0; }
    body#content { display: flex; flex-direction: column; }

    .pp-appbar {
      flex: 0 0 48px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      background: linear-gradient(135deg, #0070F2 0%, #0040A8 55%, #0A2540 100%);
      color: #fff;
      font-family: 'Segoe UI', '72', system-ui, sans-serif;
      box-shadow: 0 2px 12px rgba(0,64,168,.18);
      z-index: 5;
    }
    .pp-appbar .pp-brand { display: flex; align-items: center; gap: .5rem; font-size: 13px; font-weight: 700; letter-spacing: .3px; }
    .pp-appbar .pp-brand .mark { width: 26px; height: 26px; border-radius: 8px; background: rgba(255,255,255,.16); border: 1px solid rgba(255,255,255,.32); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; }
    .pp-appbar .pp-brand .mark svg { width: 13px; height: 13px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .pp-appbar .pp-app { font-weight: 600; opacity: .82; font-size: 12px; border-left: 1px solid rgba(255,255,255,.3); padding-left: .55rem; }
    .pp-appbar .pp-actions { display: flex; align-items: center; gap: 8px; }
    .pp-appbar a, .pp-appbar button {
      font-family: inherit; font-size: 12px; font-weight: 600; line-height: 1; white-space: nowrap;
      padding: 7px 12px; border-radius: 8px; cursor: pointer; text-decoration: none; border: 1px solid transparent;
    }
    .pp-appbar .pp-back {
      background: rgba(255,255,255,.16); color: #fff; border-color: rgba(255,255,255,.35);
      display: inline-flex; align-items: center; gap: 5px;
    }
    .pp-appbar .pp-back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .pp-appbar .pp-back:hover { background: rgba(255,255,255,.28); }
    .pp-appbar .pp-logout { background: #fff; color: #0058C4; }
    .pp-appbar .pp-logout:hover { background: #EAF2FF; }

    .pp-app-host { flex: 1 1 auto; min-height: 0; position: relative; }
    #container { position: absolute; inset: 0; }
  </style>
</head>
<body class="sapUiBody" id="content">

  <header class="pp-appbar">
    <span class="pp-brand">
      <span class="mark"><svg viewBox="0 0 24 24"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg></span>
      PrimePath Travel
      <span class="pp-app">Team Dashboard</span>
    </span>
    <span class="pp-actions">
      <a class="pp-back" href="/team-start.html" title="Terug naar het dashboard"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Terug</a>
      <button class="pp-logout" type="button" onclick="ppLogout()">Afmelden</button>
    </span>
  </header>

  <div class="pp-app-host">
    <div data-sap-ui-component
      data-name="primepath.team"
      data-id="container"
      data-height="100%"
      data-settings='{"id":"primepath.team"}'
      data-handle-validation="true">
    </div>
  </div>

  <script>
    function ppLogout(){ fetch('/auth/logout',{method:'POST',credentials:'include'}).finally(function(){ location.href='/'; }); }
  </script>
</body>
</html>
