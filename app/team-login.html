<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrimePath Travel – Inloggen Team Lead</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: '72', 'SAP72', Arial, sans-serif;
      background: #f5f6f7;
      color: #32363a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .shell-header {
      background: #0a6ed1;
      color: #fff;
      padding: 0 2rem;
      height: 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 4px rgba(0,0,0,.2);
    }
    .shell-header .logo { font-size: 1rem; font-weight: 700; letter-spacing: .5px; }
    .shell-header .subtitle { font-size: .75rem; opacity: .85; }

    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-card {
      background: #fff;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
    }
    .login-card .icon {
      width: 3rem;
      height: 3rem;
      background: #eaf5ea;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }
    .login-card h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: .25rem; }
    .role-badge {
      display: inline-block;
      font-size: .7rem;
      font-weight: 600;
      padding: .2rem .6rem;
      border-radius: 20px;
      background: #eaf5ea;
      color: #107e3e;
      margin-bottom: 1.5rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: .875rem;
      font-weight: 600;
      margin-bottom: .35rem;
      color: #32363a;
    }
    .form-group input {
      width: 100%;
      padding: .5rem .75rem;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: .875rem;
      font-family: inherit;
      transition: border-color .15s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #107e3e;
      box-shadow: 0 0 0 2px rgba(16,126,62,.15);
    }
    .btn-login {
      width: 100%;
      padding: .65rem;
      background: #107e3e;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: .9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: .5rem;
      transition: background .15s;
    }
    .btn-login:hover:not(:disabled) { background: #0d6633; }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }
    .error-msg {
      display: none;
      background: #fce4e4;
      border: 1px solid #e8a1a1;
      border-radius: 4px;
      padding: .5rem .75rem;
      font-size: .8rem;
      color: #c0392b;
      margin-top: .75rem;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.25rem;
      font-size: .8rem;
      color: #0a6ed1;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header class="shell-header">
    <span class="logo">✈ PrimePath Travel</span>
    <span class="subtitle">Exploratory Travel Dashboard</span>
  </header>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="icon">👥</div>
      <h1>Team Dashboard</h1>
      <span class="role-badge">Team Lead</span>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Gebruikersnaam</label>
          <input type="text" id="username" name="username" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password">Wachtwoord</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-login" id="submitBtn">Inloggen</button>
        <div class="error-msg" id="errorMsg"></div>
      </form>

      <a href="/" class="back-link">← Terug naar overzicht</a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorMsg');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Bezig...';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value
          })
        });

        const data = await res.json();

        if (!res.ok) {
          err.textContent = data.error || 'Inloggen mislukt.';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Inloggen';
          return;
        }

        if (data.role !== 'TeamLead') {
          err.textContent = 'Je hebt geen toegang tot het Team Dashboard. Gebruik het juiste dashboard voor jouw rol.';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Inloggen';
          return;
        }

        window.location.href = '/team/';
      } catch {
        err.textContent = 'Verbindingsfout. Probeer het opnieuw.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Inloggen';
      }
    });
  </script>
</body>
</html>
