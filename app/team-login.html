<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrimePath Travel – Inloggen Team Lead</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Open+Sans:wght@400;500;600;700&display=swap');

    /* ── Design tokens ───────────────────────────────────────────
       Huisstijl-variabelen gelijk aan de andere login- en startschermen.
       --role / --role-dark zijn de Team Lead–accentkleur (groen).       */
    :root {
      --font-head: 'Poppins','72','Segoe UI',system-ui,sans-serif;
      --font-body: 'Open Sans','72','Segoe UI',system-ui,sans-serif;
      --pp-brand: #0070F2; --pp-brand-dark: #0040A8; --pp-brand-darker: #0A2540;
      --pp-ink: #1A2A3A; --pp-muted: #5B6B7B; --pp-line: #E3E9F0;
      --pp-surface: #FFFFFF;
      --role: #1F9D63; --role-dark: #167A4C;   /* Team Lead–groen */
    }

    /* ── Reset ───────────────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Pagina-achtergrond ──────────────────────────────────────
       Gelaagde gradiënt: blauw merkkleur + subtiele cyaan gloed. */
    body {
      font-family: var(--font-body);
      color: var(--pp-ink); min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem 1.5rem;
      background:
        radial-gradient(1000px 400px at 80% -5%, rgba(0,180,216,.25), transparent 60%),
        linear-gradient(135deg, var(--pp-brand) 0%, var(--pp-brand-dark) 55%, var(--pp-brand-darker) 100%);
      -webkit-font-smoothing: antialiased;
    }
    h1 { font-family: var(--font-head); }
    /* Herbruikbare SVG-klasse: geen fill, enkel stroke zodat iconen
       dezelfde kleur erven als de omliggende tekst.                 */
    svg.ic { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Merklogo boven de kaart ─────────────────────────────── */
    .brand-lockup { display: flex; align-items: center; gap: .6rem; color: #fff; margin-bottom: 1.5rem; }
    .brand-lockup .mark { width: 2.1rem; height: 2.1rem; border-radius: 10px; background: rgba(255,255,255,.16); border: 1px solid rgba(255,255,255,.3); display: flex; align-items: center; justify-content: center; }
    .brand-lockup .mark svg { width: 1.15rem; height: 1.15rem; }
    .brand-lockup .name { font-family: var(--font-head); font-size: 1rem; font-weight: 700; letter-spacing: .3px; line-height: 1.1; }
    .brand-lockup .sub  { font-size: .7rem; opacity: .82; }

    /* ── Login-kaart ─────────────────────────────────────────────
       Witte kaart met schaduw; header in de rol-accentkleur,
       body bevat het formulier.                                    */
    .login-card {
      background: var(--pp-surface); border-radius: 18px; width: 100%; max-width: 410px;
      box-shadow: 0 18px 50px rgba(10,37,64,.35); overflow: hidden;
    }
    .card-head {
      background: linear-gradient(135deg, var(--role), var(--role-dark));
      padding: 1.5rem; display: flex; align-items: center; justify-content: center;
    }
    .card-head .icon { width: 3.25rem; height: 3.25rem; border-radius: 16px; background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.35); display: flex; align-items: center; justify-content: center; color: #fff; }
    .card-head .icon svg { width: 1.6rem; height: 1.6rem; }
    .card-body { padding: 1.75rem 2rem 2rem; }

    /* ── Rol-badge, titel en ondertitel ─────────────────────── */
    .role-badge { display: inline-flex; font-size: .68rem; font-weight: 700; letter-spacing: .3px; text-transform: uppercase; padding: .25rem .65rem; border-radius: 999px; background: color-mix(in srgb, var(--role) 12%, #fff); color: var(--role); margin-bottom: .6rem; }
    .login-card h1 { font-size: 1.3rem; font-weight: 700; }
    .card-lead { font-size: .85rem; color: var(--pp-muted); margin: .25rem 0 1.4rem; }

    /* ── Formuliervelden ─────────────────────────────────────── */
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: .82rem; font-weight: 600; margin-bottom: .35rem; color: var(--pp-ink); }
    .form-group input {
      width: 100%; padding: .6rem .8rem; border: 1px solid var(--pp-line); border-radius: 10px;
      font-size: .9rem; font-family: inherit; transition: border-color .15s, box-shadow .15s;
    }
    /* Focus-ring in de rol-accentkleur voor toegankelijkheid */
    .form-group input:focus { outline: none; border-color: var(--role); box-shadow: 0 0 0 3px color-mix(in srgb, var(--role) 18%, transparent); }

    /* ── Inlogknop ───────────────────────────────────────────── */
    .btn-login {
      width: 100%; padding: .7rem; border: none; border-radius: 10px;
      background: linear-gradient(135deg, var(--role), var(--role-dark)); color: #fff;
      font-size: .92rem; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: .5rem;
      box-shadow: 0 6px 16px color-mix(in srgb, var(--role) 35%, transparent); transition: transform .12s, box-shadow .12s, opacity .12s;
    }
    .btn-login:hover:not(:disabled) { transform: translateY(-1px); }
    /* Disabled-state tijdens het verzoek: visuele feedback dat er gewacht wordt */
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }

    /* ── Foutmelding en teruglink ────────────────────────────── */
    .error-msg { display: none; background: #FDECEC; border: 1px solid #F4B6B0; border-radius: 10px; padding: .55rem .8rem; font-size: .8rem; color: #B23A2E; margin-top: .75rem; }
    .back-link { display: block; text-align: center; margin-top: 1.4rem; font-size: .8rem; color: var(--pp-muted); text-decoration: none; }
    .back-link:hover { color: var(--role); }
  </style>
</head>
<body>
  <!-- Merklogo: zichtbaar boven de loginkaart, altijd in het wit tegen de gradiëntachtergrond -->
  <div class="brand-lockup">
    <span class="mark"><svg class="ic" viewBox="0 0 24 24"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg></span>
    <div>
      <div class="name">PrimePath Travel</div>
      <div class="sub">Exploratory Travel Dashboard</div>
    </div>
  </div>

  <!-- Loginkaart: card-head = gekleurde icoonbalk, card-body = formulier -->
  <div class="login-card">
    <!-- Kaart-header: toont het rol-icoon (Team Lead = groepsicoon) -->
    <div class="card-head"><span class="icon"><svg class="ic" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span></div>

    <div class="card-body">
      <!-- Rol-badge en paginatitel -->
      <span class="role-badge">Team Lead</span>
      <h1>Team Dashboard</h1>
      <p class="card-lead">Meld je aan om verder te gaan.</p>

      <!-- Loginformulier: submit-handler zit in het <script>-blok onderaan -->
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Gebruikersnaam</label>
          <!-- autocomplete="username" laat wachtwoordmanagers de velden correct herkennen -->
          <input type="text" id="username" name="username" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password">Wachtwoord</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-login" id="submitBtn">Inloggen</button>
        <!-- Foutmelding: standaard verborgen, wordt zichtbaar bij een mislukte loginpoging -->
        <div class="error-msg" id="errorMsg"></div>
      </form>

      <a href="/" class="back-link">← Terug naar overzicht</a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorMsg');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Bezig...';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value
          })
        });

        const data = await res.json();

        if (!res.ok) {
          err.textContent = data.error || 'Inloggen mislukt.';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Inloggen';
          return;
        }

        if (data.role !== 'TeamLead') {
          err.textContent = 'Je hebt geen toegang tot het Team Dashboard. Gebruik het juiste dashboard voor jouw rol.';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Inloggen';
          return;
        }

        window.location.href = '/team-start.html';
      } catch {
        err.textContent = 'Verbindingsfout. Probeer het opnieuw.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Inloggen';
      }
    });
  </script>
</body>
</html>
